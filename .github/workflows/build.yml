name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.7"
  GODOT_RELEASE: "stable"
  PROJECT_NAME: "Engulfed"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint:
    name: Lint GDScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gdtoolkit
        run: pip install gdtoolkit==4.*

      - name: Lint
        run: |
          find . -name "*.gd" -not -path "./.godot/*" | xargs --no-run-if-empty gdlint

  build:
    needs: lint
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot/export_templates
            /usr/local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}_linux.x86_64.zip
          unzip -q Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}_linux.x86_64.zip
          sudo mv Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Export Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_RELEASE }}
          unzip -q Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}_export_templates.tpz -d /tmp/export_templates
          mv /tmp/export_templates/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_RELEASE }}/

      - name: Import project (build class cache)
        run: godot --headless --editor --quit-after 200 . || true

      - name: Windows Build
        run: |
          mkdir -p builds/windows
          godot --headless --export-release "Windows Desktop" "${{ github.workspace }}/builds/windows/${{ env.PROJECT_NAME }}.exe"

      - name: Linux Build
        run: |
          mkdir -p builds/linux
          godot --headless --export-release "Linux" "${{ github.workspace }}/builds/linux/${{ env.PROJECT_NAME }}.x86_64"

      - name: Web Build
        run: |
          mkdir -p builds/web
          godot --headless --export-release "Web" "${{ github.workspace }}/builds/web/index.html"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-windows
          path: builds/windows/
          retention-days: 30

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-linux
          path: builds/linux/
          retention-days: 30

      - name: Upload Web Pages Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web/

  deploy-web:
    name: Deploy Web to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
